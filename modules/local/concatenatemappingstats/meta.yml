---
name: "concatenatemappingstats"
description: write your description here
keywords:
  - concatenate
  - tsv

input:
  - meta:
    type: map
    description: |
      Groovy Map containing sample information
      e.g. `[ id:'sample1', single_end:false ]`
  - reports:
    type: list
    description: collection of alignment reports in .tsv format
    pattern: "*.{tsv}"
    ontologies:
      - edam: "http://edamontology.org/format_3475"

  - meta:
    type: map
    description: |
      Groovy Map containing sample information
      e.g. `[ id:'sample1', single_end:false ]`
  - reference_fastas:
    type: list
    description: list of two input reference genomes in fasta format
    pattern: "*.{fa,fna,fasta,fa.gz,fasta.gz}"
    ontologies:
      - edam: "http://edamontology.org/format_1929"

output:
  - meta:
      - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
      - summary:
        type: file
        description: tab separated file
        pattern: "*.{tsv}"
        ontologies:
          - edam: "http://edamontology.org/format_3475"

  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
          pattern: "versions.yml"

authors:
  - "@azmigueldario"
maintainers:
  - "@azmigueldario"
